[phases.setup]
nixPkgs = ["python312", "nodejs_20"]

[phases.install]
cmds = [
  "cd frontend && npm install --legacy-peer-deps",
  "python3 -m venv /app/venv",
  "/app/venv/bin/pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && /app/venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
