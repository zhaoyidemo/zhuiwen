<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>继续追问 | 抖音数据分析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system', 'BlinkMacSystemFont', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    .tabular-nums { font-variant-numeric: tabular-nums; }
    [x-cloak] { display: none !important; }
  </style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 font-sans">

<div x-data="app()" x-cloak>

  <!-- 密码验证 -->
  <template x-if="!authed">
    <div class="min-h-screen bg-gray-900 flex items-center justify-center">
      <form @submit.prevent="login" class="bg-gray-800 rounded-2xl p-8 w-full max-w-sm shadow-2xl">
        <div class="flex justify-center mb-6">
          <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </div>
        </div>
        <h1 class="text-white text-xl font-semibold text-center mb-2">继续追问</h1>
        <p class="text-gray-400 text-sm text-center mb-6">抖音数据分析平台</p>
        <input type="password" x-model="password" placeholder="请输入访问密码"
          class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 mb-4" autofocus>
        <p x-show="loginError" class="text-red-400 text-sm mb-4" x-text="loginError"></p>
        <button type="submit" :disabled="!password || loginLoading"
          class="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white rounded-lg font-medium transition-colors">
          <span x-text="loginLoading ? '验证中...' : '进入'"></span>
        </button>
      </form>
    </div>
  </template>

  <!-- 主界面 -->
  <template x-if="authed">
    <div class="flex h-screen">
      <!-- 侧边栏 -->
      <aside class="w-56 bg-gray-900 text-gray-300 flex flex-col shrink-0">
        <div class="p-5 border-b border-gray-700">
          <h1 class="text-lg font-bold text-white leading-tight">继续追问</h1>
          <p class="text-xs text-gray-500 mt-1">抖音数据分析平台</p>
        </div>
        <nav class="flex-1 py-4 px-3 space-y-1">
          <button @click="tab='video'" :class="tab==='video' ? 'bg-blue-600/20 text-blue-400' : 'hover:bg-gray-800 text-gray-400'"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm w-full text-left transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            视频分析
          </button>
          <button @click="tab='competitor'" :class="tab==='competitor' ? 'bg-blue-600/20 text-blue-400' : 'hover:bg-gray-800 text-gray-400'"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm w-full text-left transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            竞品雷达
          </button>
          <button @click="tab='favorites'" :class="tab==='favorites' ? 'bg-amber-600/20 text-amber-400' : 'hover:bg-gray-800 text-gray-400'"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm w-full text-left transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            爆款收藏 <span x-show="favoriteVideos.length" class="ml-auto text-[10px] bg-amber-600/30 text-amber-400 px-1.5 py-0.5 rounded" x-text="favoriteVideos.length"></span>
          </button>
          <button @click="tab='guest'; if (!guests.length) loadGuests()" :class="tab==='guest' ? 'bg-green-600/20 text-green-400' : 'hover:bg-gray-800 text-gray-400'"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm w-full text-left transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            嘉宾研究 <span x-show="guests.length" class="ml-auto text-[10px] bg-green-600/30 text-green-400 px-1.5 py-0.5 rounded" x-text="guests.length"></span>
          </button>
          <button class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm w-full text-left text-gray-600 cursor-default">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            作战仪表盘 <span class="ml-auto text-[10px] bg-gray-700 text-gray-500 px-1.5 py-0.5 rounded">V2</span>
          </button>
          <button class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm w-full text-left text-gray-600 cursor-default">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a9 9 0 0 1 9 9c0 3.9-3.2 7.1-5.2 9.3a2 2 0 0 1-3 .1C10.8 18.5 3 13.4 3 9a9 9 0 0 1 9-7z"/></svg>
            AI 分析 <span class="ml-auto text-[10px] bg-gray-700 text-gray-500 px-1.5 py-0.5 rounded">V2</span>
          </button>
          <div class="mt-4 pt-4 border-t border-gray-700">
            <p class="text-[10px] text-gray-600 uppercase tracking-wider px-3 mb-2">设置</p>
            <button @click="tab='prompts'; if (!aiPrompts.length) loadAiPrompts()" :class="tab==='prompts' ? 'bg-gray-700/50 text-gray-300' : 'hover:bg-gray-800 text-gray-400'"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm w-full text-left transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
              提示词管理
            </button>
          </div>
        </nav>
        <div class="p-4 border-t border-gray-700 text-xs text-gray-600">v1.0.0 · 赵翼</div>
      </aside>

      <!-- 主内容 -->
      <main class="flex-1 overflow-auto">

        <!-- 视频分析 -->
        <div x-show="tab==='video'" class="p-6 max-w-4xl mx-auto">
          <h2 class="text-2xl font-bold text-gray-800 mb-1">视频分析</h2>
          <p class="text-sm text-gray-500 mb-6">粘贴抖音视频链接，一键获取完整数据</p>

          <div class="flex gap-3 mb-8">
            <input type="text" x-model="videoUrl" @keydown.enter="parseVideo" placeholder="粘贴抖音视频链接（支持 v.douyin.com 短链和完整链接）"
              class="flex-1 px-4 py-3 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100">
            <button @click="parseVideo" :disabled="videoLoading || !videoUrl.trim()"
              class="px-6 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-xl font-medium flex items-center gap-2 transition-colors">
              <svg x-show="!videoLoading" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <svg x-show="videoLoading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              解析
            </button>
          </div>

          <div x-show="videoError" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm" x-text="videoError"></div>

          <!-- 历史记录 -->
          <div x-show="!videoData && videoHistory.length" class="mb-6">
            <div class="flex items-center justify-between mb-3">
              <h3 class="text-sm font-medium text-gray-500">解析历史</h3>
              <button @click="clearHistory" class="text-xs text-gray-400 hover:text-red-500">清空</button>
            </div>
            <div class="space-y-2">
              <template x-for="h in videoHistory.slice(0, 10)" :key="h.aweme_id">
                <div @click="loadFromHistory(h)" class="flex items-center gap-3 bg-white rounded-xl border border-gray-200 p-3 cursor-pointer hover:shadow-md transition-shadow">
                  <img x-show="h.cover_url" :src="h.cover_url" class="w-16 h-12 rounded-lg object-cover shrink-0">
                  <div class="flex-1 min-w-0">
                    <p class="text-sm text-gray-800 line-clamp-1" x-text="h.desc || '(无描述)'"></p>
                    <div class="flex items-center gap-3 text-xs text-gray-400 mt-0.5">
                      <span x-text="h.author_nickname"></span>
                      <span x-show="h.play_count">▶ <span x-text="fmtNum(h.play_count)"></span></span>
                      <span>❤ <span x-text="fmtNum(h.digg_count)"></span></span>
                      <span class="font-medium" :class="rateColorClass(h.collect_rate)" x-text="fmtRate(h.collect_rate)"></span>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- 视频结果 -->
          <template x-if="videoData">
            <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
              <div class="flex flex-col md:flex-row">
                <div class="md:w-72 shrink-0 bg-black flex items-center justify-center" x-show="videoData.cover_url">
                  <img :src="videoData.cover_url" class="w-full h-full object-contain max-h-96">
                </div>
                <div class="flex-1 p-6">
                  <!-- 作者 -->
                  <div class="flex items-center gap-3 mb-4">
                    <img x-show="videoData.author_avatar" :src="videoData.author_avatar" class="w-10 h-10 rounded-full">
                    <div>
                      <p class="font-medium text-gray-800" x-text="videoData.author_nickname || '未知作者'"></p>
                      <p class="text-xs text-gray-400">
                        @<span x-text="videoData.author_unique_id"></span>
                        <template x-if="videoData.author_follower_count">
                          <span> · <span x-text="fmtNum(videoData.author_follower_count)"></span> 粉丝</span>
                        </template>
                      </p>
                    </div>
                  </div>
                  <p class="text-gray-700 text-sm leading-relaxed mb-4" x-text="videoData.desc || '(无描述)'"></p>

                  <!-- 收藏率高亮 -->
                  <div class="rounded-xl border p-4 mb-4" :class="rateBgClass(videoData.collect_rate)">
                    <p class="text-xs text-gray-500 mb-1" x-text="videoData.play_count > 0 ? '收藏率（北极星指标）' : '收藏率（基于点赞数估算，播放量不可用）'"></p>
                    <p class="text-3xl font-bold tabular-nums" :class="rateColorClass(videoData.collect_rate)" x-text="fmtRate(videoData.collect_rate)"></p>
                  </div>

                  <!-- 互动数据 -->
                  <div class="grid grid-cols-5 gap-3 mb-4">
                    <template x-for="s in videoStats" :key="s.label">
                      <div class="text-center p-2 bg-gray-50 rounded-lg">
                        <p class="text-sm font-semibold text-gray-800 tabular-nums" x-text="fmtNum(s.value)"></p>
                        <p class="text-[10px] text-gray-400" x-text="s.label"></p>
                      </div>
                    </template>
                  </div>

                  <!-- 元信息 -->
                  <div class="flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-400 mb-4">
                    <span>发布 <span x-text="videoData.create_time"></span></span>
                    <span x-show="videoData.duration > 0" x-text="'时长 ' + fmtDuration(videoData.duration)"></span>
                    <span x-show="videoData.music_title" x-text="'♪ ' + videoData.music_title"></span>
                  </div>

                  <!-- 话题标签 -->
                  <div class="flex flex-wrap gap-1.5 mb-2" x-show="videoData.tags">
                    <template x-for="tag in (videoData.tags||'').split(',').filter(t=>t.trim())" :key="tag">
                      <span class="px-2.5 py-1 bg-blue-50 text-blue-600 rounded-full text-xs" x-text="'#'+tag.trim()"></span>
                    </template>
                  </div>
                  <!-- 内容分类标签 -->
                  <div class="flex flex-wrap gap-1.5 mb-4" x-show="videoData.video_tags">
                    <template x-for="vt in (videoData.video_tags||'').split(',').filter(t=>t.trim())" :key="vt">
                      <span class="px-2.5 py-1 bg-emerald-50 text-emerald-600 rounded-full text-xs" x-text="vt.trim()"></span>
                    </template>
                  </div>

                  <!-- 操作 -->
                  <div class="flex items-center gap-3 pt-2 border-t border-gray-100">
                    <a x-show="videoData.video_url" :href="videoData.video_url" target="_blank"
                      class="flex items-center gap-1.5 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors">
                      ⬇ 无水印下载
                    </a>
                    <button @click="loadExtended" :disabled="extendedLoading"
                      class="flex items-center gap-1.5 px-4 py-2 bg-purple-600 text-white rounded-lg text-sm hover:bg-purple-700 disabled:bg-gray-300 transition-colors">
                      <svg x-show="!extendedLoading" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                      <svg x-show="extendedLoading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                      评论
                    </button>
                    <button @click="toggleFavorite(videoData)"
                      class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm transition-colors"
                      :class="isFavorited(videoData.aweme_id) ? 'bg-amber-100 text-amber-600' : 'bg-amber-50 text-amber-500 hover:bg-amber-100'">
                      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                      <span x-text="isFavorited(videoData.aweme_id) ? '已收藏' : '爆款收藏'"></span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </template>

          <!-- 评论区域 -->
          <template x-if="extendedData">
            <div class="mt-6 space-y-6">

              <!-- 评论热词 -->
              <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6" x-show="extendedData.word_cloud && extendedData.word_cloud.length">
                <h3 class="text-lg font-semibold text-gray-800 mb-4">评论热词</h3>
                <div class="flex flex-wrap gap-2">
                  <template x-for="(w, i) in extendedData.word_cloud" :key="i">
                    <span class="px-3 py-1.5 rounded-full cursor-default"
                      :style="'font-size:' + Math.max(13, Math.min(28, 13 + w.weight * 3)) + 'px'"
                      :class="['bg-blue-50 text-blue-700', 'bg-purple-50 text-purple-700', 'bg-amber-50 text-amber-700', 'bg-emerald-50 text-emerald-700', 'bg-rose-50 text-rose-700'][i % 5]">
                      <span x-text="w.word"></span>
                      <span class="text-[10px] opacity-60" x-text="'×' + w.weight"></span>
                    </span>
                  </template>
                </div>
              </div>

              <!-- 热门评论（含回复展开） -->
              <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6" x-show="extendedData.comments && extendedData.comments.length">
                <h3 class="text-lg font-semibold text-gray-800 mb-1">热门评论</h3>
                <p class="text-xs text-gray-400 mb-4">共 <span x-text="extendedData.comments.length"></span> 条 · 按点赞排序</p>
                <div class="max-h-[600px] overflow-y-auto space-y-4">
                  <template x-for="(c, i) in extendedData.comments.slice().sort((a,b) => (b.digg_count||0) - (a.digg_count||0))" :key="c.comment_id || i">
                    <div class="border-b border-gray-50 pb-3">
                      <div class="flex gap-3 text-sm">
                        <div class="shrink-0 w-6 text-right text-gray-300 text-xs pt-0.5" x-text="i + 1"></div>
                        <div class="flex-1 min-w-0">
                          <div class="flex items-center gap-2 mb-0.5">
                            <span class="font-medium text-gray-700 text-xs" x-text="c.user_nickname || '匿名'"></span>
                            <span class="text-[10px] text-rose-400" x-show="c.digg_count" x-text="'❤ ' + c.digg_count"></span>
                            <span class="text-[10px] text-blue-400" x-show="c.reply_count" x-text="'💬 ' + c.reply_count + '条回复'"></span>
                          </div>
                          <p class="text-gray-600 leading-relaxed" x-text="c.content"></p>
                          <!-- 展开回复按钮 -->
                          <button x-show="c.reply_count > 0" @click="c._showReplies ? (c._showReplies = false) : loadCommentReplies(c)"
                            class="mt-1 text-xs text-blue-500 hover:text-blue-600">
                            <span x-text="c._showReplies ? '收起回复' : ('查看 ' + c.reply_count + ' 条回复')"></span>
                            <span x-show="c._loadingReplies" class="ml-1">加载中...</span>
                          </button>
                          <!-- 回复列表 -->
                          <div x-show="c._showReplies && c._replies?.length" class="mt-2 ml-4 space-y-2 border-l-2 border-gray-100 pl-3">
                            <template x-for="(r, ri) in c._replies" :key="r.comment_id || ri">
                              <div class="text-xs">
                                <div class="flex items-center gap-2 mb-0.5">
                                  <span class="font-medium text-gray-600" x-text="r.user_nickname || '匿名'"></span>
                                  <span class="text-[10px] text-rose-300" x-show="r.digg_count" x-text="'❤ ' + r.digg_count"></span>
                                </div>
                                <p class="text-gray-500" x-text="r.content"></p>
                              </div>
                            </template>
                          </div>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- 没有数据 -->
              <div x-show="!extendedData.comments || !extendedData.comments.length"
                class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 text-center text-gray-400">
                <p>该视频暂无评论数据</p>
              </div>

            </div>
          </template>
        </div>

        <!-- 竞品雷达 -->
        <div x-show="tab==='competitor'" class="p-6">
          <h2 class="text-2xl font-bold text-gray-800 mb-1">竞品账号雷达</h2>
          <p class="text-sm text-gray-500 mb-6">添加竞品账号，追踪视频数据表现</p>

          <div class="flex gap-3 mb-6">
            <input type="text" x-model="uniqueId" @keydown.enter="addAccount" placeholder="输入抖音号 unique_id"
              class="flex-1 max-w-sm px-4 py-2.5 border border-gray-300 rounded-xl text-sm focus:outline-none focus:border-blue-500">
            <select x-model="accountCategory" class="px-3 py-2.5 border border-gray-300 rounded-xl text-sm bg-white">
              <option value="竞品">竞品</option>
              <option value="自己主号">自己主号</option>
              <option value="矩阵号">矩阵号</option>
            </select>
            <button @click="addAccount" :disabled="addingAccount || !uniqueId.trim()"
              class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-xl text-sm font-medium flex items-center gap-2 transition-colors">
              <svg x-show="!addingAccount" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <svg x-show="addingAccount" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
              添加
            </button>
          </div>

          <div x-show="accountError" class="mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm" x-text="accountError"></div>

          <!-- 账号卡片 -->
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mb-8" x-show="accounts.length">
            <template x-for="acc in accounts" :key="acc.sec_user_id || acc.unique_id">
              <div @click="selectAccount(acc)"
                class="bg-white rounded-xl border p-4 cursor-pointer transition-all hover:shadow-md relative group"

                    <div class="w-6 h-6 rounded-md bg-cyan-500 text-white flex items-center justify-center shrink-0">
                      <svg x-show="!guestSearching" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                      <svg x-show="guestSearching" class="w-3 h-3 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                    </div>
                    <span x-text="guestSearching ? '工作中...' : 'AI调查员'"></span>
                  </button>
                </div>
                <p class="text-[10px] text-gray-400 mb-3">Sonnet · 智能补搜 + 引用链追踪 + 微信公众号定向搜索</p>

                <!-- 手动添加链接 -->
                <div class="flex gap-2 items-center">
                  <select x-model="newMaterialPlatform" class="w-24 px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:outline-none focus:border-green-500">
                    <option value="">平台</option>
                    <option value="抖音">抖音</option>
                    <option value="B站">B站</option>
                    <option value="YouTube">YouTube</option>
                    <option value="小宇宙">小宇宙</option>
                    <option value="网页">网页</option>
                    <option value="其他">其他</option>
                  </select>
                  <input type="text" x-model="newMaterialTitle" placeholder="标题（选填）"
                    class="w-32 px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:outline-none focus:border-green-500">
                  <input type="text" x-model="newMaterialUrl" placeholder="粘贴采访链接" @keydown.enter="addGuestMaterial"
                    class="flex-1 px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:outline-none focus:border-green-500">
                  <button @click="addGuestMaterial" :disabled="!newMaterialUrl.trim()"
                    class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 disabled:bg-gray-50 disabled:text-gray-300 text-gray-600 rounded-lg text-xs font-medium transition-colors">
                    添加
                  </button>
                </div>
              </div>

              <!-- 素材列表 -->
              <div class="bg-white rounded-2xl border border-gray-200 p-5 mb-4" x-show="guestMaterials.length">
                <h4 class="text-sm font-medium text-gray-600 mb-3">素材资料 (<span x-text="guestMaterials.length"></span>)</h4>
                <div class="space-y-2 max-h-[500px] overflow-y-auto">
                  <template x-for="m in guestMaterials" :key="m.id">
                    <div class="bg-gray-50 rounded-xl overflow-hidden">
                      <!-- 素材头部 -->
                      <div class="group flex items-start gap-3 p-3 cursor-pointer" :class="m.status === 'excluded' ? 'opacity-40' : ''" @click="m._expanded = !m._expanded">
                        <div class="shrink-0 mt-0.5">
                          <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-medium"
                            :class="{'bg-blue-100 text-blue-600': m.type === 'search_result', 'bg-yellow-100 text-yellow-700': m.type === 'ai_summary', 'bg-green-100 text-green-600': m.type === 'manual_link'}"
                            x-text="m.type === 'ai_summary' ? 'AI汇总' : m.type === 'search_result' ? '搜索' : (m.platform || '链接')"></span>
                          <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-medium ml-1"
                            :class="{'bg-emerald-100 text-emerald-600': m.status === 'verified', 'bg-yellow-100 text-yellow-700': m.status === 'unverified', 'bg-red-100 text-red-500': m.status === 'failed' || m.status === 'excluded', 'bg-gray-100 text-gray-400': !m.status || m.status === 'pending'}"
                            x-show="m.status && m.status !== 'pending'"
                            x-text="{'verified':'已验证','unverified':'未验证','failed':'失败','excluded':'已排除'}[m.status] || ''"></span>
                        </div>
                        <div class="flex-1 min-w-0">
                          <p class="text-sm text-gray-800" :class="[m._expanded ? '' : 'truncate', m.status === 'excluded' ? 'line-through' : '']" x-text="m.title || m.url || '(无标题)'"></p>
                          <p x-show="m.url" class="text-xs text-blue-500 truncate mt-0.5">
                            <a :href="m.url" target="_blank" @click.stop x-text="m.url" class="hover:underline"></a>
                          </p>
                          <p x-show="m.summary && !m._expanded" class="text-xs text-gray-500 mt-1 line-clamp-2" x-text="m.summary"></p>
                        </div>
                        <div class="flex items-center gap-1 shrink-0">
                          <button @click.stop="toggleMaterialExclude(m)" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-yellow-500 transition-all" :title="m.status === 'excluded' ? '恢复使用' : '排除此素材'">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
                          </button>
                          <button @click.stop="deleteGuestMaterial(m.id)" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                          </button>
                          <svg class="w-4 h-4 text-gray-400 transition-transform" :class="m._expanded ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                        </div>
                      </div>
                      <!-- 展开：完整内容 -->
                      <div x-show="m._expanded" class="px-3 pb-3 border-t border-gray-200">
                        <div x-show="m.summary" class="mt-2">
                          <p class="text-[10px] text-gray-400 mb-1">摘要</p>
                          <p class="text-xs text-gray-600" x-text="m.summary"></p>
                        </div>
                        <div class="mt-2">
                          <div class="flex items-center justify-between mb-1">
                            <p class="text-[10px] text-gray-400">正文内容</p>
                            <button @click.stop="updateMaterialContent(m)" class="text-[10px] text-blue-500 hover:text-blue-700" x-text="m.content ? '编辑内容' : '粘贴内容'"></button>
                          </div>
                          <div x-show="m.content" class="text-xs text-gray-700 leading-relaxed max-h-60 overflow-y-auto whitespace-pre-line bg-white rounded-lg p-3 border border-gray-100" x-text="m.content"></div>
                          <p x-show="!m.content" class="text-xs text-gray-400 italic">暂无内容 — 点击右上角「粘贴内容」手动添加</p>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- AI 同事团队 -->
              <div class="bg-white rounded-2xl border border-gray-200 p-5 mb-4">
                <h4 class="text-sm font-medium text-gray-600 mb-4">AI 同事</h4>
                <p x-show="!guestMaterials.length" class="text-xs text-gray-400 mb-3">请先让 AI调查员 搜索素材</p>

                <!-- 第一步：AI策划专员 -->
                <div class="mb-3">
                  <button @click="runGuestAnalysis()" :disabled="guestAnalyzing || !guestMaterials.length"
                    class="w-full flex items-center gap-3 px-4 py-3 rounded-xl border-2 text-sm font-medium transition-all"
                    :class="guestAnalyzing ? 'bg-blue-50 border-blue-400 text-blue-700' : 'border-blue-200 hover:border-blue-400 hover:bg-blue-50 text-gray-700 disabled:opacity-30 disabled:border-gray-200'">
                    <div class="w-8 h-8 rounded-lg bg-blue-500 text-white flex items-center justify-center shrink-0">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    </div>
                    <div class="flex-1 text-left">
                      <span class="font-semibold" x-text="guestAnalyzing ? 'AI策划专员 工作中...' : 'AI策划专员'"></span>
                      <p class="text-[10px] opacity-60 font-normal">Sonnet · 段落式采访策划 · 每段=一个切片</p>
                    </div>
                    <svg x-show="guestAnalyzing" class="w-4 h-4 animate-spin shrink-0" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                  </button>
                </div>

                <!-- 第二步：三位编导并行 -->
                <div class="grid grid-cols-3 gap-2 mb-3">
                  <button @click="runDeepFollowup()" :disabled="guestFollowingUp || !guestAnalyses.some(a => a.analysis_type === 'interview')"
                    class="flex flex-col items-center gap-1.5 px-3 py-3 rounded-xl border-2 text-xs font-medium transition-all"
                    :class="guestFollowingUp ? 'bg-purple-50 border-purple-400 text-purple-700' : 'border-purple-200 hover:border-purple-400 hover:bg-purple-50 text-gray-600 disabled:opacity-30 disabled:border-gray-200'">
                    <div class="w-7 h-7 rounded-lg bg-purple-500 text-white flex items-center justify-center">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <span x-text="guestFollowingUp ? '工作中...' : 'AI内容编导'"></span>
                    <span class="text-[9px] opacity-50 font-normal">Opus · 追问设计</span>
                  </button>
                  <button @click="runClipReview()" :disabled="guestClipReviewing || !guestAnalyses.some(a => a.analysis_type === 'interview')"
                    class="flex flex-col items-center gap-1.5 px-3 py-3 rounded-xl border-2 text-xs font-medium transition-all"
                    :class="guestClipReviewing ? 'bg-orange-50 border-orange-400 text-orange-700' : 'border-orange-200 hover:border-orange-400 hover:bg-orange-50 text-gray-600 disabled:opacity-30 disabled:border-gray-200'">
                    <div class="w-7 h-7 rounded-lg bg-orange-500 text-white flex items-center justify-center">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                    <span x-text="guestClipReviewing ? '工作中...' : 'AI切片编导'"></span>
                    <span class="text-[9px] opacity-50 font-normal">Opus · 标题/金句</span>
                  </button>
                  <button @click="runTrendingReview()" :disabled="guestTrendingReviewing || !guestAnalyses.some(a => a.analysis_type === 'interview')"
                    class="flex flex-col items-center gap-1.5 px-3 py-3 rounded-xl border-2 text-xs font-medium transition-all"
                    :class="guestTrendingReviewing ? 'bg-rose-50 border-rose-400 text-rose-700' : 'border-rose-200 hover:border-rose-400 hover:bg-rose-50 text-gray-600 disabled:opacity-30 disabled:border-gray-200'">
                    <div class="w-7 h-7 rounded-lg bg-rose-500 text-white flex items-center justify-center">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
                    </div>
                    <span x-text="guestTrendingReviewing ? '工作中...' : 'AI热点编导'"></span>
                    <span class="text-[9px] opacity-50 font-normal">Sonnet · 热点嫁接</span>
                  </button>
                </div>
                <p class="text-[10px] text-gray-400">三位编导需先完成策划专员，可并行启动</p>
              </div>

              <!-- AI嘉宾替身 -->
              <div class="bg-white rounded-2xl border border-gray-200 p-5 mb-4">
                <div class="flex items-center gap-3 mb-3">
                  <div class="w-7 h-7 rounded-lg bg-teal-500 text-white flex items-center justify-center shrink-0">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                  </div>
                  <div>
                    <h4 class="text-sm font-medium text-gray-600">AI嘉宾替身</h4>
                    <p class="text-[10px] text-gray-400">Sonnet · AI 扮演嘉宾，练习提问和追问</p>
                  </div>
                </div>
                <div class="space-y-3">
                  <!-- 对话记录 -->
                  <div x-show="guestChatHistory.length" class="max-h-80 overflow-y-auto space-y-2 mb-2">
                    <template x-for="(msg, i) in guestChatHistory" :key="i">
                      <div class="flex gap-2" :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                        <div class="max-w-[80%] px-3 py-2 rounded-xl text-sm"
                          :class="msg.role === 'user' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'">
                          <p class="text-[10px] mb-1 opacity-60" x-text="msg.role === 'user' ? '你（主持人）' : selectedGuest?.name"></p>
                          <div x-html="msg.role === 'user' ? msg.text : renderMarkdown(msg.text)"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                  <!-- 输入框 -->
                  <div class="flex gap-2">
                    <input type="text" x-model="guestChatInput" @keydown.enter="sendGuestChat" placeholder="输入你的采访问题..."
                      :disabled="guestChatLoading"
                      class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                    <button @click="sendGuestChat" :disabled="!guestChatInput.trim() || guestChatLoading"
                      class="px-4 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 text-white rounded-lg text-sm font-medium transition-colors">
                      <span x-text="guestChatLoading ? '...' : '提问'"></span>
                    </button>
                  </div>
                  <button x-show="guestChatHistory.length" @click="guestChatHistory = []" class="text-xs text-gray-400 hover:text-gray-600">清空对话</button>
                </div>
              </div>

              <!-- 分析结果 -->
              <div x-show="guestAnalyses.length" class="space-y-3">
                <h4 class="text-sm font-medium text-gray-600">分析结果 (<span x-text="guestAnalyses.length"></span>)</h4>
                <template x-for="a in guestAnalyses" :key="a.id">
                  <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
                    <div @click="guestAnalysisExpanded = guestAnalysisExpanded === a.id ? null : a.id"
                      class="flex items-center justify-between px-5 py-3 cursor-pointer hover:bg-gray-50 transition-colors">
                      <div class="flex items-center gap-3">
                        <span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium"
                          :class="{'bg-blue-100 text-blue-700': a.analysis_type === 'interview', 'bg-purple-100 text-purple-700': a.analysis_type === 'followup', 'bg-orange-100 text-orange-700': a.analysis_type === 'clip', 'bg-rose-100 text-rose-700': a.analysis_type === 'trending'}"
                          x-text="guestAnalysisLabel(a.analysis_type)"></span>
                        <span class="text-xs text-gray-400" x-text="a.content?.created_at || a.created_at"></span>
                      </div>
                      <div class="flex items-center gap-2">
                        <button @click.stop="copyAnalysisText(a)" class="text-gray-300 hover:text-blue-500 transition-colors" title="复制全文">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        </button>
                        <button @click.stop="deleteGuestAnalysis(a.id)" class="text-gray-300 hover:text-red-500 transition-colors" title="删除">
                          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                        <svg class="w-4 h-4 text-gray-400 transition-transform" :class="guestAnalysisExpanded === a.id ? 'rotate-180' : ''" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                      </div>
                    </div>
                    <div x-show="guestAnalysisExpanded === a.id" class="px-5 pb-5 border-t border-gray-100">
                      <div class="prose prose-sm max-w-none mt-3 text-sm text-gray-700 leading-relaxed"
                        x-html="renderMarkdown(a.content?.result || '')"></div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- 未选中嘉宾时的占位 -->
            <div class="flex-1 flex items-center justify-center" x-show="!selectedGuest">
              <div class="text-center text-gray-400">
                <svg class="w-16 h-16 mx-auto mb-3 opacity-30" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                <p class="text-sm">选择左侧嘉宾开始研究</p>
              </div>
            </div>
          </div>
        </div>

        <!-- 提示词管理 -->
        <div x-show="tab==='prompts'" class="p-6 max-w-3xl mx-auto">
          <h2 class="text-2xl font-bold text-gray-800 mb-1">提示词管理</h2>
          <p class="text-sm text-gray-500 mb-6">管理 AI 洞察和其他功能使用的提示词模板</p>

          <div class="space-y-4">
            <template x-for="(p, pi) in aiPrompts" :key="p.name">
              <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
                <div class="flex items-center justify-between mb-3">
                  <h3 class="text-base font-semibold text-gray-800" x-text="p.name"></h3>
                  <div class="flex items-center gap-2">
                    <span x-show="p.is_default" class="text-[10px] px-2 py-0.5 bg-blue-50 text-blue-500 rounded">默认</span>
                    <button @click="p._editing = !p._editing" class="text-xs text-blue-500 hover:text-blue-600" x-text="p._editing ? '收起' : '编辑'"></button>
                    <button @click="deleteAiPrompt(p.name)" class="text-xs text-red-400 hover:text-red-600">删除</button>
                  </div>
                </div>
                <!-- 预览 -->
                <div x-show="!p._editing" class="text-sm text-gray-600 whitespace-pre-line max-h-32 overflow-y-auto bg-gray-50 rounded-lg p-3" x-text="p.content"></div>
                <!-- 编辑 -->
                <div x-show="p._editing">
                  <textarea x-model="p.content" rows="12" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm resize-y font-mono"></textarea>
                  <div class="flex items-center justify-end gap-2 mt-2">
                    <button @click="saveAiPrompt(p.name, p.content); p._editing = false"
                      class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">保存</button>
                  </div>
                </div>
              </div>
            </template>
          </div>

          <!-- 新增提示词 -->
          <div class="mt-6 bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
            <h3 class="text-base font-semibold text-gray-800 mb-3">新增提示词</h3>
            <input x-model="newPromptName" type="text" placeholder="提示词名称" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm mb-2">
            <textarea x-model="newPromptContent" rows="6" placeholder="提示词内容..." class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm resize-y font-mono mb-2"></textarea>
            <button @click="if (newPromptName && newPromptContent) { saveAiPrompt(newPromptName, newPromptContent); newPromptName=''; newPromptContent=''; }"
              class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">添加</button>
          </div>
        </div>

      </main>
    </div>
  </template>
</div>

<script>
function app() {
  return {
    // 认证
    authed: !!localStorage.getItem('site_password'),
    password: '',
    loginError: '',
    loginLoading: false,
    async init() { if (this.authed) await this.initData(); },

    // 导航
    tab: 'video',

    // 视频分析
    videoUrl: '',
    videoLoading: false,
    videoError: '',
    videoData: null,
    extendedData: null,
    extendedLoading: false,
    videoHistory: [],

    // 竞品雷达
    uniqueId: '',
    accountCategory: '竞品',
    accounts: [],
    addingAccount: false,
    accountError: '',
    syncingId: null,
    selectedAccount: null,
    competitorVideos: [],
    sortBy: 'collect_rate',
    fillingPlay: false,
    fillProgress: '',
    xingtuData: null,
    xingtuLoading: false,
    xingtuModuleState: {
      index:    { loading: false, failed: false, cached_at: '' },
      cp:       { loading: false, failed: false, cached_at: '' },
      portrait: { loading: false, failed: false, cached_at: '' },
      price:    { loading: false, failed: false, cached_at: '' },
    },

    // 嘉宾研究
    guests: [],
    selectedGuest: null,
    guestMaterials: [],
    guestAnalyses: [],
    newGuestName: '',
    newGuestDesc: '',
    addingGuest: false,
    guestSearching: false,
    extraSearchKeywords: '',
    guestAnalyzing: null,
    guestError: '',
    newMaterialUrl: '',
    newMaterialPlatform: '',
    newMaterialTitle: '',
    guestAnalysisExpanded: null,
    guestFollowingUp: false,
    guestClipReviewing: false,
    guestTrendingReviewing: false,
    guestChatHistory: [],
    guestChatInput: '',
    guestChatLoading: false,

    favoriteVideos: [],
    favoriteRefreshing: null,
    aiPrompts: [],
    aiAnalyzingId: null,
    first5sAnalyzingId: null,
    newPromptName: '',
    newPromptContent: '',

    // API 请求
    async api(method, path, body = null) {
      const headers = { 'Content-Type': 'application/json', 'X-Site-Password': localStorage.getItem('site_password') || '' };
      const opts = { method, headers };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch('/api' + path, opts);
      if (res.status === 401) { localStorage.removeItem('site_password'); this.authed = false; throw new Error('密码错误'); }
      const json = await res.json().catch(() => ({}));
      // 统一响应格式：{code, data, message}
      if (json.code !== undefined) {
        if (json.code !== 0) throw new Error(json.message || '请求失败');
        return json.data;
      }
      // 兼容旧格式
      if (!res.ok) throw new Error(json.detail || json.message || '请求失败');
      return json;
    },

    // 登录
    async login() {
      this.loginLoading = true; this.loginError = '';
      try {
        await this.api('POST', '/auth/verify', { password: this.password });
        localStorage.setItem('site_password', this.password);
        this.authed = true;
        await this.initData();
      } catch (e) { this.loginError = '密码错误，请重试'; }
      this.loginLoading = false;
    },

    // 初始化：从数据库加载数据
    async initData() {
      try {
        const [accRes, histRes, favRes, guestRes] = await Promise.all([
          this.api('GET', '/accounts'),
          this.api('GET', '/videos/history'),
          this.api('GET', '/favorites'),
          this.api('GET', '/guests'),
        ]);
        this.accounts = accRes.accounts || [];
        this.videoHistory = (histRes.history || []).map(h => h.data || h);
        this.favoriteVideos = (favRes.favorites || []).map(f => ({ ...f.data, _fav_id: f.id, _fav_at: f.created_at, ai_analysis: f.ai_analysis || {}, first5s_analysis: f.first5s_analysis || {} }));
        this.guests = guestRes.guests || [];
      } catch (e) { /* 静默失败 */ }
    },

    // 解析视频
    async parseVideo() {
      if (!this.videoUrl.trim()) return;
      this.videoLoading = true; this.videoError = ''; this.videoData = null; this.extendedData = null;
      try {
        this.videoData = await this.api('POST', '/videos/parse', { url: this.videoUrl.trim() });
        // 保存到历史记录（后端已自动存库，前端只更新内存列表）
        if (this.videoData?.aweme_id) {
          this.videoHistory = this.videoHistory.filter(v => v.aweme_id !== this.videoData.aweme_id);
          this.videoHistory.unshift(this.videoData);
          if (this.videoHistory.length > 50) this.videoHistory = this.videoHistory.slice(0, 50);
        }
      } catch (e) { this.videoError = e.message; }
      this.videoLoading = false;
    },

    // 从历史记录加载
    loadFromHistory(v) {
      this.videoData = v;
      this.extendedData = null;
      this.videoUrl = v.source_url || '';
    },

    // 清空历史
    async clearHistory() {
      this.videoHistory = [];
      try { await this.api('DELETE', '/videos/history'); } catch (e) { /* ignore */ }
    },

    // 加载评论回复
    async loadCommentReplies(comment) {
      if (comment._loadingReplies) return;
      comment._loadingReplies = true;
      try {
        const awemeId = this.videoData?.aweme_id || '';
        const res = await this.api('GET', '/videos/' + awemeId + '/comment-replies?comment_id=' + comment.comment_id);
        comment._replies = res.replies || [];
        comment._showReplies = true;
      } catch (e) { /* ignore */ }
      comment._loadingReplies = false;
    },

    // 加载评论数据
    async loadExtended() {
      if (!this.videoData?.aweme_id) return;
      this.extendedLoading = true;
      try {
        const dur = this.videoData.duration || 0;
        const data = await this.api('GET', '/videos/' + this.videoData.aweme_id + '/comments?duration=' + dur);
        // 从评论中提取高频词
        const comments = data.comments || [];
        const wordMap = {};
        comments.forEach(c => {
          const text = (c.content || '').replace(/[@#\[\]【】]/g, '');
          // 按中文2-6字词和英文单词拆分
          const segs = text.match(/[\u4e00-\u9fff]{2,6}|[a-zA-Z]{3,}/g) || [];
          segs.forEach(w => { wordMap[w] = (wordMap[w] || 0) + 1; });
        });
        const wordCloud = Object.entries(wordMap)
          .filter(([w, c]) => c >= 2)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 30)
          .map(([word, count]) => ({ word, weight: count }));
        this.extendedData = { comments, word_cloud: wordCloud };
      } catch (e) { this.videoError = '评论加载失败: ' + e.message; }
      this.extendedLoading = false;
    },

    // 添加账号
    async addAccount() {
      if (!this.uniqueId.trim()) return;
      if (this.accounts.some(a => a.unique_id === this.uniqueId.trim())) {
        this.accountError = '该账号已添加'; return;
      }
      this.addingAccount = true; this.accountError = '';
      try {
        const acc = await this.api('POST', '/accounts', { unique_id: this.uniqueId.trim(), category: this.accountCategory });
        this.accounts.push(acc);
        this.uniqueId = '';
      } catch (e) { this.accountError = e.message; }
      this.addingAccount = false;
    },

    // 删除账号
    async removeAccount(acc) {
      const uid = acc.sec_user_id || acc.unique_id;
      this.accounts = this.accounts.filter(a => (a.sec_user_id || a.unique_id) !== uid);
      if (this.selectedAccount && (this.selectedAccount.sec_user_id || this.selectedAccount.unique_id) === uid) {
        this.selectedAccount = null;
        this.competitorVideos = [];
      }
      try { await this.api('DELETE', '/accounts/' + uid); } catch (e) { /* ignore */ }
    },

    // 更新账号汇总数据
    updateAccountStats(acc) {
      const vids = this.competitorVideos;
      acc._synced = vids.length;
      acc._avgCollectRate = vids.length ? vids.reduce((s, v) => s + (v.collect_rate || 0), 0) / vids.length : 0;
      acc._topCollectRate = vids.length ? Math.max(...vids.map(v => v.collect_rate || 0)) : 0;
      acc._avgEngagementRate = vids.length ? vids.reduce((s, v) => s + (v.engagement_rate || 0), 0) / vids.length : 0;
      acc._topEngagementRate = vids.length ? Math.max(...vids.map(v => v.engagement_rate || 0)) : 0;
    },

    // 选中账号 → 从数据库加载视频
    async selectAccount(acc) {
      this.selectedAccount = acc;
      this.xingtuData = null;
      this.accountError = '';
      this.syncingId = acc.sec_user_id;
      try {
        const res = await this.api('GET', '/accounts/' + acc.sec_user_id + '/videos?sort_by=collect_rate&order=desc');
        this.competitorVideos = res.videos || [];
        this.updateAccountStats(acc);
      } catch (e) {
        this.competitorVideos = [];
        this.accountError = '加载视频失败: ' + e.message;
      }
      this.syncingId = null;
      this.sortVideos();
      // 自动加载缓存的星图数据（独立并发，不阻塞）
      if (acc.sec_user_id) this.loadXingtu(acc, false);
    },

    // 同步视频（后端存库）
    async syncAccount(acc) {
      if (!acc.sec_user_id && acc.unique_id) {
        try {
          const fresh = await this.api('POST', '/accounts', { unique_id: acc.unique_id, category: acc.category || '竞品' });
          Object.assign(acc, fresh);
        } catch (e) { this.accountError = '刷新账号信息失败: ' + e.message; return; }
      }
      if (!acc.sec_user_id) { this.accountError = '该账号缺少 sec_user_id，请删除后重新添加'; return; }
      this.syncingId = acc.sec_user_id; this.accountError = '';
      try {
        const result = await this.api('POST', '/accounts/' + acc.sec_user_id + '/sync');
        if (result.account) Object.assign(acc, result.account);
        // 后台同步中，轮询等待视频数据就绪
        this.accountError = '视频同步中，请稍候...';
        const prevCount = this.competitorVideos.length;
        for (let i = 0; i < 60; i++) {
          await new Promise(r => setTimeout(r, 3000));
          const dbVideos = await this.api('GET', '/accounts/' + acc.sec_user_id + '/videos?sort_by=collect_rate&order=desc');
          const newCount = (dbVideos.videos || []).length;
          this.accountError = `视频同步中... ${newCount} 条`;
          if (newCount > prevCount || (i > 5 && newCount > 0)) {
            this.competitorVideos = dbVideos.videos || [];
            break;
          }
          if (i === 59) this.competitorVideos = dbVideos.videos || [];
        }
        this.selectedAccount = acc;
        acc._lastSync = new Date().toLocaleString('zh-CN');
        this.updateAccountStats(acc);
        this.sortVideos();
        this.accountError = '';
      } catch (e) { this.accountError = e.message; }
      this.syncingId = null;
    },

    // 逐批补充播放量（每次2个，后端自动更新数据库）
    async fillPlayCount() {
      if (this.fillingPlay || !this.competitorVideos.length || !this.selectedAccount) return;
      this.fillingPlay = true;
      const todo = this.competitorVideos.filter(v => !v.play_count && v.aweme_id);
      const total = todo.length;
      if (!total) { this.fillProgress = `全部 ${this.competitorVideos.length} 条已有播放量`; this.fillingPlay = false; return; }
      let done = 0, filled = 0;
      for (let i = 0; i < total; i += 2) {
        const batch = todo.slice(i, i + 2);
        const ids = batch.map(v => v.aweme_id);
        this.fillProgress = `${done}/${total} 获取中...`;
        try {
          const res = await this.api('POST', '/videos/batch-stats', ids);
          const stats = res.stats || {};
          batch.forEach(v => {
            const s = stats[v.aweme_id];
            if (s && s.play_count > 0) {
              v.play_count = s.play_count;
              v.collect_rate = v.collect_count / s.play_count;
              v.engagement_rate = (v.digg_count + v.comment_count + v.share_count + v.collect_count) / s.play_count;
              filled++;
            }
          });
        } catch (e) { /* 继续下一批 */ }
        done += batch.length;
      }
      this.updateAccountStats(this.selectedAccount);
      this.fillProgress = `完成！${filled}/${total} 条获取到播放量`;
      this.fillingPlay = false;
      this.sortVideos();
    },

    // 爆款收藏

    // 前5秒截帧分析（服务端 FFMPEG 截帧 + Claude Vision 分析）

    },

    renderMarkdown(text) {
      if (!text) return '';
      // 先提取代码块保护起来
      const codeBlocks = [];
      text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => {
        codeBlocks.push(`<pre class="bg-gray-100 rounded-lg p-3 text-xs overflow-x-auto my-2"><code>${code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`);
        return `__CODE_BLOCK_${codeBlocks.length - 1}__`;
      });
      // 转义 HTML
      text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // 标题
      text = text.replace(/^### (.+)$/gm, '<h3 class="text-base font-bold text-gray-800 mt-4 mb-2">$1</h3>');
      text = text.replace(/^## (.+)$/gm, '<h2 class="text-lg font-bold text-gray-800 mt-5 mb-2">$1</h2>');
      text = text.replace(/^# (.+)$/gm, '<h1 class="text-xl font-bold text-gray-800 mt-6 mb-3">$1</h1>');
      // 加粗/斜体
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // 表格
      text = text.replace(/^\|(.+)\|$/gm, (m, row) => {
        const cells = row.split('|').map(c => c.trim());
        if (cells.every(c => /^[-:]+$/.test(c))) return '';
        const tag = 'td';
        return '<tr>' + cells.map(c => `<${tag} class="border border-gray-200 px-3 py-1.5 text-xs">${c}</${tag}>`).join('') + '</tr>';
      });
      text = text.replace(/(<tr>[\s\S]*?<\/tr>)/g, '<table class="w-full border-collapse my-3">$1</table>');
      // 列表
      text = text.replace(/^- (.+)$/gm, '<li class="ml-4 list-disc">$1</li>');
      text = text.replace(/^(\d+)\. (.+)$/gm, '<li class="ml-4 list-decimal">$2</li>');
      // 换行
      text = text.replace(/\n{2,}/g, '<br><br>');
      text = text.replace(/\n/g, '<br>');
      // 还原代码块
      codeBlocks.forEach((block, i) => { text = text.replace(`__CODE_BLOCK_${i}__`, block); });
      return text;
    },

          segs.forEach(w => { wordMap[w] = (wordMap[w] || 0) + 1; });

    // 加载单个星图模块
    async loadXingtuModule(acc, module, refresh = false) {
      if (!acc?.sec_user_id) return;
      const keyMap = { index: 'xingtu_index', cp: 'cp_info', portrait: 'fans_portrait', price: 'service_price' };
      const state = this.xingtuModuleState[module];
      state.loading = true; state.failed = false;
      this.xingtuLoading = true;
      try {
        const res = await this.api('GET', `/accounts/${acc.sec_user_id}/xingtu/${module}?refresh=${refresh}`);
        const dataKey = keyMap[module];
        if (!this.xingtuData) this.xingtuData = {};
        this.xingtuData = { ...this.xingtuData, [dataKey]: res[dataKey] };
        state.cached_at = res.cached_at || '';
        const d = res[dataKey];
        const isEmpty = !d || (typeof d === 'object' && !Array.isArray(d) && !Object.keys(d).length);
        state.failed = isEmpty;
      } catch (e) {
        state.failed = true;
      }
      state.loading = false;
      this.xingtuLoading = Object.values(this.xingtuModuleState).some(m => m.loading);
    },

    // 加载全部星图模块（并发）
    async loadXingtu(acc, refresh = false) {
      if (!acc?.sec_user_id) { this.accountError = '该账号缺少 sec_user_id'; return; }
      this.selectedAccount = acc; this.accountError = '';
      this.xingtuData = null;
      ['index', 'cp', 'portrait', 'price'].forEach(m => {
        this.xingtuModuleState[m] = { loading: false, failed: false, cached_at: '' };
      });
      ['index', 'cp', 'portrait', 'price'].forEach(m => this.loadXingtuModule(acc, m, refresh));
    },

    // 星图评论热词相关方法
    xingtuHasHotWords() {
      const hw = this.xingtuData?.hot_comment_keywords;
      if (!hw) return false;
      if (Array.isArray(hw) && hw.length > 0) return true;
      if (typeof hw === 'object' && !Array.isArray(hw)) {
        // 可能是 {list: [...]} 或 {keywords: [...]} 等
        for (const v of Object.values(hw)) {
          if (Array.isArray(v) && v.length > 0) return true;
        }
      }
      return false;
    },
    xingtuHotWords() {
      const hw = this.xingtuData?.hot_comment_keywords;
      if (!hw) return [];
      if (Array.isArray(hw)) return hw;
      if (typeof hw === 'object') {
        for (const v of Object.values(hw)) {
          if (Array.isArray(v) && v.length > 0) return v;
        }
      }
      return [];
    },

    // 粉丝趋势相关方法
    xingtuHasDailyFans() {
      const df = this.xingtuData?.daily_fans;
      if (!df) return false;
      if (Array.isArray(df) && df.length > 0) return true;
      if (typeof df === 'object' && !Array.isArray(df)) {
        for (const v of Object.values(df)) {
          if (Array.isArray(v) && v.length > 0) return true;
        }
      }
      return false;
    },
    // 提取代表作视频列表
    xingtuRecVideos() {
      const rv = this.xingtuData?.rec_videos;
      if (!rv) return [];
      if (Array.isArray(rv)) return rv.slice(0, 5);
      if (typeof rv === 'object') {
        for (const v of Object.values(rv)) {
          if (Array.isArray(v) && v.length > 0) return v.slice(0, 5);
        }
      }
      return [];
    },

    // 汇总30天粉丝增减
    xingtuFansSummary() {
      const rows = (() => {
        const df = this.xingtuData?.daily_fans;
        if (!df) return [];
        if (Array.isArray(df)) return df;
        if (typeof df === 'object') {
          for (const v of Object.values(df)) {
            if (Array.isArray(v) && v.length > 0) return v;
          }
        }
        return [];
      })();
      let gained = 0, lost = 0;
      rows.forEach(r => {
        const g = r.new_fans_count || r.new_fans || r.incr || 0;
        const l = r.lost_fans_count || r.lost_fans || r.decr || 0;
        if (g > 0) gained += g;
        if (l > 0) lost += l;
        // 如果只有 net_increase
        if (!g && !l && (r.net_increase || r.count)) {
          const n = r.net_increase || r.count || 0;
          if (n >= 0) gained += n; else lost += Math.abs(n);
        }
      });
      return { net: gained - lost, gained, lost };
    },

    // 嘉宾研究
    async loadGuests() {
      try {
        const res = await this.api('GET', '/guests');
        this.guests = res.guests || [];
      } catch (e) { /* ignore */ }
    },
    async createGuest() {
      if (!this.newGuestName.trim() || this.addingGuest) return;
      this.addingGuest = true; this.guestError = '';
      try {
        const guest = await this.api('POST', '/guests', { name: this.newGuestName.trim(), description: this.newGuestDesc.trim() });
        this.guests.unshift(guest);
        this.newGuestName = '';
        this.newGuestDesc = '';
      } catch (e) { this.guestError = e.message; }
      this.addingGuest = false;
    },
    async deleteGuest(guest) {
      if (!confirm('确定删除嘉宾「' + guest.name + '」及其所有资料？')) return;
      try {
        await this.api('DELETE', '/guests/' + guest.id);
        this.guests = this.guests.filter(g => g.id !== guest.id);
        if (this.selectedGuest?.id === guest.id) {
          this.selectedGuest = null;
          this.guestMaterials = [];
          this.guestAnalyses = [];
        }
      } catch (e) { this.guestError = e.message; }
    },
    async selectGuest(guest) {
      this.selectedGuest = guest;
      this.guestError = '';
      this.guestAnalysisExpanded = null;
      this.guestChatHistory = [];
      await Promise.all([this.loadGuestMaterials(guest.id), this.loadGuestAnalyses(guest.id)]);
    },
    async loadGuestMaterials(guestId) {
      try {
        const res = await this.api('GET', '/guests/' + guestId + '/materials');
        this.guestMaterials = res.materials || [];
      } catch (e) { this.guestMaterials = []; }
    },
    async loadGuestAnalyses(guestId) {
      try {
        const res = await this.api('GET', '/guests/' + guestId + '/analyses');
        this.guestAnalyses = res.analyses || [];
      } catch (e) { this.guestAnalyses = []; }
    },
    async searchGuest() {
      if (!this.selectedGuest || this.guestSearching) return;
      this.guestSearching = true; this.guestError = '';
      try {
        await this.api('POST', '/guests/' + this.selectedGuest.id + '/actions/search', {
          extra_keywords: this.extraSearchKeywords,
        });
        // 后台搜索中，轮询等待素材出现
        const prevCount = this.guestMaterials.length;
        for (let i = 0; i < 40; i++) {
          await new Promise(r => setTimeout(r, 3000));
          await this.loadGuestMaterials(this.selectedGuest.id);
          if (this.guestMaterials.length > prevCount) break;
        }
      } catch (e) { this.guestError = '搜索失败: ' + e.message; }
      this.guestSearching = false;
    },
    async addGuestMaterial() {
      if (!this.selectedGuest || !this.newMaterialUrl.trim()) return;
      this.guestError = '';
      try {
        await this.api('POST', '/guests/' + this.selectedGuest.id + '/materials', {
          url: this.newMaterialUrl.trim(),
          platform: this.newMaterialPlatform,
          title: this.newMaterialTitle.trim(),
        });
        this.newMaterialUrl = '';
        this.newMaterialPlatform = '';
        this.newMaterialTitle = '';
        await this.loadGuestMaterials(this.selectedGuest.id);
      } catch (e) { this.guestError = e.message; }
    },
    async deleteGuestMaterial(mid) {
      if (!this.selectedGuest) return;
      try {
        await this.api('DELETE', '/guests/' + this.selectedGuest.id + '/materials/' + mid);
        this.guestMaterials = this.guestMaterials.filter(m => m.id !== mid);
      } catch (e) { /* ignore */ }

    async runGuestAnalysis() {
      if (!this.selectedGuest || this.guestAnalyzing) return;
      this.guestAnalyzing = true; this.guestError = '';
      try {
        if (!this.aiPrompts.length) await this.loadAiPrompts();
        const p = this.aiPrompts.find(p => p.name === 'AI策划专员');
        await this.api('POST', '/guests/' + this.selectedGuest.id + '/actions/plan', {
          prompt: p?.content || '',
        });
        // 后台分析中，轮询等待结果
        const prevCount = this.guestAnalyses.length;
        for (let i = 0; i < 40; i++) {
          await new Promise(r => setTimeout(r, 3000));
          await this.loadGuestAnalyses(this.selectedGuest.id);
          if (this.guestAnalyses.length > prevCount) break;
        }
      } catch (e) { this.guestError = '分析失败: ' + e.message; }
      this.guestAnalyzing = null;
    },

        await this.api('DELETE', '/guests/' + this.selectedGuest.id + '/analyses/' + aid);
        this.guestAnalyses = this.guestAnalyses.filter(a => a.id !== aid);

          await new Promise(r => setTimeout(r, 3000));
          await this.loadGuestAnalyses(this.selectedGuest.id);
          if (this.guestAnalyses.length > prevCount) break;
        }
      } catch (e) { this.guestError = 'AI切片编导失败: ' + e.message; }

    async sendGuestChat() {
      if (!this.selectedGuest || !this.guestChatInput.trim() || this.guestChatLoading) return;
      const msg = this.guestChatInput.trim();
      this.guestChatHistory.push({ role: 'user', text: msg });
      this.guestChatInput = '';
      this.guestChatLoading = true;
      try {
        const res = await this.api('POST', '/guests/' + this.selectedGuest.id + '/actions/chat', {
          message: msg,
          history: this.guestChatHistory.slice(0, -1),
        });
        this.guestChatHistory.push({ role: 'guest', text: res.reply });
      } catch (e) {
        this.guestChatHistory.push({ role: 'guest', text: '对话失败: ' + e.message });
      }
      this.guestChatLoading = false;
    },
    async updateMaterialContent(m) {
      if (!this.selectedGuest) return;
      const content = prompt('粘贴文章/转录内容：', m.content || '');
      if (content === null) return;
      try {
        await this.api('PUT', '/guests/' + this.selectedGuest.id + '/materials/' + m.id, { content });
        m.content = content;
        m.status = content ? 'verified' : m.status;
      } catch (e) { /* ignore */ }
    },
    async toggleMaterialExclude(m) {
      if (!this.selectedGuest) return;
      const newStatus = m.status === 'excluded' ? 'verified' : 'excluded';
      try {
        await this.api('PUT', '/guests/' + this.selectedGuest.id + '/materials/' + m.id, { status: newStatus });
        m.status = newStatus;
      } catch (e) { /* ignore */ }
    },
    copyAnalysisText(a) {
      const text = a.content?.result || '';
      navigator.clipboard.writeText(text).then(() => {
        this.guestError = '已复制到剪贴板';
        setTimeout(() => this.guestError = '', 2000);
      });
    },

    sortVideos() {
      const key = this.sortBy;
      this.competitorVideos.sort((a, b) => {
        if (key === 'create_time') return String(b[key] || '').localeCompare(String(a[key] || ''));
        return (b[key] || 0) - (a[key] || 0);
      });
    },

    // 计算属性
    get videoStats() {
      if (!this.videoData) return [];
      const d = this.videoData;
      return [
        { label: '播放量', value: d.play_count },
        { label: '点赞', value: d.digg_count },
        { label: '评论', value: d.comment_count },
        { label: '收藏', value: d.collect_count },
        { label: '转发', value: d.share_count },
      ];
    },

    // 工具函数
    fmtNum(n) {
      if (n >= 1e8) return (n / 1e8).toFixed(1) + '亿';
      if (n >= 1e4) return (n / 1e4).toFixed(1) + '万';
      return String(n || 0);
    },
    fmtRate(r) { return (r * 100).toFixed(2) + '%'; },
    fmtDuration(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); },
    rateColorClass(r) { return r >= 0.05 ? 'text-red-500' : r >= 0.03 ? 'text-amber-500' : 'text-emerald-500'; },
    rateBgClass(r) { return r >= 0.05 ? 'bg-red-50 border-red-200' : r >= 0.03 ? 'bg-amber-50 border-amber-200' : 'bg-emerald-50 border-emerald-200'; },
  }
